# Point Transformer V3 — Okolis AI outdoor segmentation
# Target: RunPod RTX A6000 (48GB VRAM)
#
# 10 dataseta: 4 urbana + 6 rezidencijalnih/europskih
# Ukupno ~5 milijardi točaka (s stride-om ~500M efektivno)

# ── Datasets ─────────────────────────────────────────────────────────────
datasets:
  hessigheim:                              # German village, UAV LiDAR — BEST match!
    root: /workspace/data/Hessigheim3D
    weight: 2.0                            # rezidencijalno selo, kuće, ograde, vrtovi
  semantic3d:                              # European villages, terrestrial scanner
    root: /workspace/data/Semantic3D
    weight: 1.5                            # s tla, europski kontekst — slično iPhoneu
  parislille:                              # French cities, mobile LiDAR — street level!
    root: /workspace/data/ParisLille3D
    weight: 1.2                            # ulični LiDAR, ceste, zgrade, pločnici
  toronto3d:
    root: /workspace/data/Toronto_3D
    weight: 1.0                            # urbani, ima vehicle/road/building
  semantickitti:                           # vraćen s velikim stride-om — jedini
    root: /workspace/data/SemanticKITTI    # pravi izvor sidewalk primjera
    weight: 0.4                            # nizak weight — ne smije dominirati

  # ── ISKLJUČENI ──
  # pandaset — autonomna vožnja, premalo rezidencijalno
  # sensaturban — UAV perspektiva, previše drugačije od iPhonea

# SemanticKITTI: load every Nth scan (saves RAM + disk)
kitti_scan_stride: 20   # 20 → ~192 scanova (bilo 5 → 3834) — dovoljno za
                        # sidewalk/fence primjere bez dominacije

# ── Point Transformer V3 architecture ────────────────────────────────────
ptv3:
  dims: [48, 96, 192, 384]
  num_heads: [3, 6, 12, 24]
  depths: [2, 2, 6, 2]
  window_size: 256
  grid_sizes: [0.08, 0.16, 0.32]    # voxel sizes for GridPool between stages
  serialize_grid: 0.04               # z-order quantization grid
  drop: 0.1                          # dropout (mild regularization)

# ── Training ─────────────────────────────────────────────────────────────
# Prošli trening (3 dataseta): peak mIoU=0.5648 @ epoch 55, stagnacija do 200.
# Sad imamo 7 dataseta — više raznolikosti, treba više koraka ali manje epoha.

crop_points: 65536       # 65K — duplo veći kontekst za bolje razumijevanje scene
                         # A6000 48GB drži batch=2 × 65K (~isti VRAM kao 4×32K)
voxel: 0.02
augment: true
modality_dropout: true
steps_per_epoch: 800     # više koraka jer je batch manji (batch=2)
                         # 800 steps / batch 2 = 400 iteracija po epohi

batch_size: 2            # 2 × 65K pts ≈ 130K pts — slično kao 4×32K=128K
num_classes: 8
in_feat_dim: 5           # [R, G, B, intensity, height_above_ground]
lr: 0.0003               # konzervativniji LR — 0.0006 uzrokovao NaN na epohi 7
epochs: 100              # 100 × 800 = 80K koraka
                         # epoha ~27 min → ukupno ~45 sati
out_dir: /workspace/runs/ptv3_5ds_v2   # v2: fence mapping fix + SemanticKITTI
                                       # stride 20 — novi cache
resume_from: /workspace/runs/ptv3_5ds_v2/last.pt   # nastavi od epohe 22
                                       # (makni ovu liniju za trening od nule)
num_workers: 8
