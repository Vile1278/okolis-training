# Point Transformer V3 — Okolis AI outdoor segmentation
# Target: RunPod RTX A6000 (48GB VRAM)
#
# 10 dataseta: 4 urbana + 6 rezidencijalnih/europskih
# Ukupno ~5 milijardi točaka (s stride-om ~500M efektivno)

# ── Datasets ─────────────────────────────────────────────────────────────
datasets:
  # ── Postojeći (urbani) ──
  toronto3d:
    root: /workspace/data/Toronto_3D
    weight: 1.0
  semantickitti:
    root: /workspace/data/SemanticKITTI
    weight: 0.7
  pandaset:
    root: /workspace/data/Pandaset
    weight: 0.8
    stride: 5

  # ── NOVI (rezidencijalni/europski) ──
  hessigheim:                              # German village, UAV LiDAR — BEST match!
    root: /workspace/data/Hessigheim3D
    weight: 1.5                            # highest weight — closest to our use case
  semantic3d:                              # European villages, terrestrial scanner
    root: /workspace/data/Semantic3D
    weight: 1.2                            # high weight — street-level perspective
  # dales i vaihingen — izostavljeni (nedostupni za download)
  sensaturban:                             # UK cities, UAV — 3B points, residential
    root: /workspace/data/SensatUrban
    weight: 0.8
    stride: 1
  parislille:                              # French cities, mobile LiDAR — street level!
    root: /workspace/data/ParisLille3D
    weight: 1.0

# SemanticKITTI: load every Nth scan (saves RAM)
kitti_scan_stride: 5

# ── Point Transformer V3 architecture ────────────────────────────────────
ptv3:
  dims: [48, 96, 192, 384]
  num_heads: [3, 6, 12, 24]
  depths: [2, 2, 6, 2]
  window_size: 256
  grid_sizes: [0.08, 0.16, 0.32]    # voxel sizes for GridPool between stages
  serialize_grid: 0.04               # z-order quantization grid
  drop: 0.1                          # dropout (mild regularization)

# ── Training ─────────────────────────────────────────────────────────────
# Prošli trening (3 dataseta): peak mIoU=0.5648 @ epoch 55, stagnacija do 200.
# Sad imamo 7 dataseta — više raznolikosti, treba više koraka ali manje epoha.

crop_points: 65536       # 64K — veći crop za bolje lokalne kontekste
                         # A6000 48GB drži batch=4 × 64K
voxel: 0.02
augment: true
modality_dropout: true
steps_per_epoch: 1500    # 1500 — više koraka jer 7 dataseta (bilo 1000 za 3)

batch_size: 4            # 4 × 64K pts = ~40GB VRAM (sigurno za A6000)
num_classes: 8
in_feat_dim: 5           # [R, G, B, intensity, height_above_ground]
lr: 0.0004               # malo niži LR — 7 dataseta = šumovitiji gradijenti
                         # cosine decay do 1e-6
epochs: 150              # manje epoha jer je steps_per_epoch veći
                         # ukupno koraka: 150×1500 = 225K (prije 200×1000 = 200K)
out_dir: /workspace/runs/ptv3_7ds
num_workers: 8
